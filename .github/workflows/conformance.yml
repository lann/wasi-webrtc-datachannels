name: Conformance

# The conformance suite (see conformance/PLAN.md). Job 1 builds the conformance
# guest once and runs the loopback + trickle-variants scenarios across all
# enabled targets, including the pairwise interop matrix, uploading the matrix
# artifact and failing on any unexpected status. Job 2 runs the ICE lab (Phase
# 5): the wasmtime two-peer corpus over a routed network-namespace topology with
# real (non-loopback) candidate paths (`lan` and `turn-relay`).
#
# Phases enabled so far:
#   - Phase 0: the runner, registry, and manifest schema.
#   - Phase 1: the conformance-signalingd HTTP mailbox server — its integration
#     tests run here, and the runner starts/health-checks/stops a live server.
#   - Phase 2: the shared conformance guest + the wasmtime adapter — `just
#     conformance` builds the guest component, runs the adapter over the
#     wasmtime host (loopback ICE, in-process signaling), and classifies the
#     wasmtime row of the matrix against conformance/manifests/wasmtime.toml.
#   - Phase 3: the jco adapters — the browser-first host transpiled by jco and
#     run under Node (`jco-node`, via @roamhq/wrtc) and headless Chromium
#     (`jco-browser`), plus the cross-runtime interop pair
#     `wasmtime`<->`jco-node` in both orders. jco's async ABI always uses JSPI
#     (WebAssembly.Suspending), so the Node driver requires Node 24+ with
#     --experimental-wasm-jspi (the browser gets JSPI natively).
#   - Phase 4: the wasip3-guest adapter — the conformance guest composed
#     (`wac plug`) with the wasip3-impl provider (the sans-I/O rtc stack over
#     WASIp3 wasi:sockets), an in-guest wasi:http mailbox client, and a CLI
#     driver, run under `wasmtime run` (installed by scripts/setup.sh) — plus
#     the cross-runtime interop pair `wasmtime`<->`wasip3-guest` in both
#     orders (wired but disabled by default pending a wasip3 teardown-flush
#     fix; see TODO.md item E3).
#   - Phase 5: the ICE lab (Job 2) — the wasmtime two-peer corpus run with each
#     peer in its own network namespace over a routed veth topology
#     (conformance/scenarios/), exercising direct host candidates (`lan`) and
#     TURN-relayed candidates through coturn with the direct path blocked
#     (`turn-relay`). `stun-srflx` is provisioned but not asserted (it needs NAT
#     on the router to be meaningful; see the README / Phase 6).
# Later phases enable more scenarios and additional jobs (see the workflow plan
# in conformance/PLAN.md).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Job 1: every PR. Builds the conformance guest and runs the enabled targets
  # (wasmtime, jco-node, jco-browser, wasip3-guest, and the wasmtime<->jco-node
  # interop pair) over loopback via `just conformance`.
  matrix:
    runs-on: ubuntu-latest
    # WebRTC handshakes can hang; cap the job so a stuck run fails fast.
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      # jco's async ABI always uses JSPI (WebAssembly.Suspending), which Node
      # only exposes on 24+ behind --experimental-wasm-jspi. The jco-node target
      # and the jco-node half of the interop pair run the guest under Node, so
      # the driver node must be 24+. (The jco-browser target runs the guest in
      # headless Chrome, which has JSPI natively.)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: conformance/adapters/jco/package-lock.json

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Share one cache across every CI job (this workflow and ci.yml). By
          # default rust-cache keys the cache by job id, so each job had its own
          # entry and this conformance job never reused the registry or the
          # compiled workspace dependencies built by the ci.yml jobs. A common
          # `shared-key` replaces the job-id key so all jobs restore/save the
          # same cache; they share one Cargo.lock, so dependency builds are
          # reusable across them.
          shared-key: cargo
          cache-all-crates: true

      - name: Install dependencies
        run: ./scripts/setup.sh

      - name: Test signaling server
        run: cargo nextest run -p conformance-signalingd

      # `just conformance` runs the jco adapters (Node + headless Chrome) and the
      # interop pair, all of which invoke `node --experimental-wasm-jspi`. The
      # setup-node step above puts a JSPI-capable Node 24 on PATH; the interop
      # orchestrator honours CONFORMANCE_NODE if a specific node is needed.
      - name: Run conformance suite
        run: just conformance

      - name: Upload conformance matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-matrix
          path: conformance/matrix.md
          if-no-files-found: warn

  # Job 2: the ICE lab (PLAN.md Phase 5). Provisions a routed network-namespace
  # topology (conformance/scenarios/) and runs the wasmtime two-peer corpus with
  # each peer in its own namespace, so the handshake traverses a real
  # (non-loopback) path. `lan` uses direct host candidates; `turn-relay` blocks
  # the direct path and relays through coturn. (`stun-srflx` needs NAT on the
  # router to be meaningful — see the README / Phase 6 — so it is provisioned but
  # not asserted here.) This runs on a real runner because network namespaces and
  # `ip netns exec` require privileges a sandbox does not grant.
  ice-lab:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      # The ICE lab is wasmtime-only, so the Node host dependencies are not
      # needed; SKIP_NODE keeps setup fast while still installing coturn/iproute2.
      - name: Install dependencies
        run: SKIP_NODE=1 ./scripts/setup.sh

      - name: Run ICE lab (lan)
        run: just conformance-ice lan

      - name: Run ICE lab (turn-relay)
        run: just conformance-ice turn-relay

      # Classify the lab results (wasmtime-<scenario>.json) against the manifests
      # and render the environment-columned matrix; exits nonzero on any failure.
      - name: Classify ICE-lab matrix
        run: |
          cargo run -p conformance-runner -- \
            --tests conformance/tests.toml \
            --manifests conformance/manifests \
            --results conformance/results \
            --matrix-out conformance/ice-matrix.md

      - name: Upload ICE-lab matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-ice-matrix
          path: conformance/ice-matrix.md
          if-no-files-found: warn
