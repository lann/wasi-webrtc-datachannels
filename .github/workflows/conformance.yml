name: Conformance

# The conformance suite (see conformance/README.md). The `matrix` job builds the
# conformance guest once and runs the loopback scenarios across all enabled
# targets, including the pairwise interop matrix, uploading the matrix artifact
# and failing on any unexpected status. The `shadow-lab` job runs the two-peer
# corpus for the wasmtime and wasip3-guest targets over a routed, non-loopback
# path inside the Shadow network simulator, which needs no root or network
# namespaces and is deterministic.
#
# The netns lab (`just conformance-netns`, `just conformance-nat`) — the
# higher-fidelity real-kernel environment with STUN/TURN/NAT candidate paths —
# is workstation-only and is not exercised in CI; Shadow provides CI's
# non-loopback coverage.
#
# Enabled targets: wasmtime (native webrtc-rs), jco-node (the browser-first
# host transpiled by jco, under Node 24+ with --experimental-wasm-jspi and
# @roamhq/wrtc), jco-browser (the same host in headless Chromium, which has
# JSPI natively), wasip3-guest (the conformance guest composed via `wac plug`
# with the wasip3-impl provider — the sans-I/O rtc stack over WASIp3
# wasi:sockets — plus an in-guest wasi:http mailbox client and a CLI driver,
# run under `wasmtime run`), and the cross-runtime interop pair
# `wasmtime`<->`jco-node` in both orders. The `wasmtime`<->`wasip3-guest`
# pairs are wired but disabled by default pending a wasip3 teardown-flush fix
# (see TODO.md item E3).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Every PR. Builds the conformance guest and runs the enabled targets
  # (wasmtime, jco-node, jco-browser, wasip3-guest, and the wasmtime<->jco-node
  # interop pair) over loopback via `just conformance`.
  matrix:
    runs-on: ubuntu-latest
    # WebRTC handshakes can hang; cap the job so a stuck run fails fast.
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      # jco's async ABI always uses JSPI (WebAssembly.Suspending), which Node
      # only exposes on 24+ behind --experimental-wasm-jspi. The jco-node target
      # and the jco-node half of the interop pair run the guest under Node, so
      # the driver node must be 24+. (The jco-browser target runs the guest in
      # headless Chrome, which has JSPI natively.)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: conformance/adapters/jco/package-lock.json

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # One cache entry per job: GitHub caches are immutable per key, so a
          # key shared across jobs is only ever saved by whichever job finishes
          # first. This job's artifact set (release-profile natives plus the
          # wasm32-unknown-unknown / wasm32-wasip2 guest builds) barely overlaps
          # the other jobs', so under a shared key it recompiled every
          # dependency on every run and could never save the result.
          shared-key: conformance-matrix
          cache-all-crates: true

      - name: Install dependencies
        run: ./scripts/setup.sh
        # cargo-binstall resolves releases through api.github.com; unauthenticated
        # requests share a 60/hour per-IP limit that pooled runner IPs exhaust
        # (intermittent 403s). The token moves it to the per-token limit.
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Test signaling server
        run: cargo nextest run -p conformance-signalingd

      # `just conformance` runs the jco adapters (Node + headless Chrome) and the
      # interop pair, all of which invoke `node --experimental-wasm-jspi`. The
      # setup-node step above puts a JSPI-capable Node 24 on PATH; the interop
      # orchestrator honours CONFORMANCE_NODE if a specific node is needed.
      - name: Run conformance suite
        run: just conformance

      - name: Upload conformance matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-matrix
          path: conformance/matrix.md
          if-no-files-found: warn

  # The Shadow lab. Runs the two-peer corpus for the wasmtime and
  # wasip3-guest targets inside the Shadow discrete-event network simulator
  # (https://github.com/shadow/shadow), which gives the same "two peers on
  # separate hosts over a non-loopback path" property as the netns lab but
  # simulates the network in user space — so it needs NO root or network
  # namespaces and is deterministic. Shadow ships no prebuilt binary, so it is
  # built once by the shadow-build workflow and published to the `shadow-dev`
  # prerelease; this job downloads that binary instead of rebuilding
  # (see scripts/download-shadow.sh).
  shadow-lab:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Needed to read the `shadow-dev` release asset via `gh release download`.
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # One cache entry per job (see the matrix job for why a cross-job
          # shared key never actually shared compiled artifacts).
          shared-key: conformance-shadow-lab
          cache-all-crates: true

      # Fetch the prebuilt Shadow from the `shadow-dev` prerelease into ~/.local
      # (bin/shadow + lib/libshadow_*.so) and put ~/.local/bin on PATH for the
      # steps below. Dispatch .github/workflows/shadow-build.yml if the release
      # does not exist yet.
      - name: Download Shadow from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/download-shadow.sh

      # The Shadow lab needs the Rust/wasm toolchain (including wac and the
      # wasm32-wasip2 target for the composed wasip3-guest peer) but no
      # coturn/iproute2; skip the Node and netns-lab deps. Shadow was downloaded
      # above.
      - name: Install dependencies
        run: SKIP_NODE=1 SKIP_NETNS_LAB=1 ./scripts/setup.sh
        # cargo-binstall resolves releases through api.github.com; unauthenticated
        # requests share a 60/hour per-IP limit that pooled runner IPs exhaust
        # (intermittent 403s). The token moves it to the per-token limit.
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run Shadow lab
        run: just conformance-shadow

      # Classify the Shadow results (<target>-shadow.json for wasmtime and
      # wasip3-guest) against the manifests and render the environment-columned
      # matrix; exits nonzero on any failure.
      - name: Classify Shadow matrix
        run: |
          cargo run -p conformance-runner -- \
            --tests conformance/tests.toml \
            --manifests conformance/manifests \
            --results conformance/results \
            --matrix-out conformance/shadow-matrix.md

      - name: Upload Shadow matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-shadow-matrix
          path: conformance/shadow-matrix.md
          if-no-files-found: warn
