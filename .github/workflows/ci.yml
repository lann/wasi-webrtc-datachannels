name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Native Rust checks (formatting, lints, WIT validation, and the Wasmtime
  # tests). Runs in parallel with the browser-host job below. No Node host is
  # needed here, so its npm dependencies are skipped.
  rust-checks:
    runs-on: ubuntu-latest
    # WebRTC handshakes can hang; cap the job so a stuck run fails fast instead
    # of waiting for the default 6h limit.
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        # The toolchain version, wasm targets, and rustfmt/clippy components are
        # pinned in rust-toolchain.toml; `rustup show` installs exactly those.
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo
        # Caches the cargo registry, `~/.cargo/bin` (so cargo-binstall'd
        # wasm-tools/just/nextest are reused), and the compiled `target/`
        # artifacts, so clippy and test reuse prior builds. A shared cache key
        # (see below) lets every CI job across both workflows reuse the same
        # cache instead of each job keeping its own.
        uses: Swatinem/rust-cache@v2
        with:
          # Share one cache across every CI job (this workflow and
          # conformance.yml). By default rust-cache keys the cache by job id, so
          # each job kept a separate entry; a common `shared-key` replaces the
          # job-id key so all jobs restore/save the same cache. They share one
          # Cargo.lock, so dependency builds are reusable across them.
          shared-key: cargo
          # The standalone manual-signaling test guest builds into a nested
          # target dir under ./target; keep the whole tree so it is not pruned.
          cache-all-crates: true

      - name: Install dependencies
        # This job never runs the Node host, so skip its npm dependencies.
        run: SKIP_NODE=1 ./scripts/setup.sh

      # Cheap checks first so an obvious formatting or WIT mistake fails the job
      # before the slower clippy/test compilation.
      - name: Check formatting
        run: just fmt-check

      - name: Validate WIT
        run: just validate-wit

      - name: Run clippy
        run: just clippy

      - name: Run tests
        run: just test

      # Build the wasip3 provider + webrtc-consumer, compose them with `wac
      # plug`, and run the composed in-guest WebRTC round trip under wasmtime.
      - name: Run composed WebRTC integration test
        run: just test-webrtc-composed

  # Guest component build + browser (jco) host test. Runs in parallel with the
  # native Rust checks above.
  browser:
    runs-on: ubuntu-latest
    # WebRTC handshakes can hang; cap the job so a stuck run fails fast instead
    # of waiting for the default 6h limit.
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        # The toolchain version, wasm targets, and rustfmt/clippy components are
        # pinned in rust-toolchain.toml; `rustup show` installs exactly those.
        run: rustup show active-toolchain || rustup toolchain install

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Cache the Node host's npm downloads so `npm install` in setup.sh
          # restores from cache instead of refetching every run.
          cache: npm
          cache-dependency-path: jco-impl/package-lock.json

      - name: Cache cargo
        # Caches the cargo registry, `~/.cargo/bin` (so cargo-binstall'd
        # wasm-tools/just/nextest are reused), and the compiled `target/`
        # artifacts, so the guest component build reuses prior builds. A shared
        # cache key (see below) lets every CI job across both workflows reuse
        # the same cache instead of each job keeping its own.
        uses: Swatinem/rust-cache@v2
        with:
          # Share one cache across every CI job (this workflow and
          # conformance.yml). By default rust-cache keys the cache by job id, so
          # each job kept a separate entry; a common `shared-key` replaces the
          # job-id key so all jobs restore/save the same cache. They share one
          # Cargo.lock, so dependency builds are reusable across them.
          shared-key: cargo
          cache-all-crates: true

      - name: Install dependencies
        run: ./scripts/setup.sh

      - name: Build echo-demo guest component
        run: just build-component

      - name: Transpile echo-demo component (Node host)
        run: just transpile

      - name: Run browser host test (headless Chrome)
        run: just test-browser
