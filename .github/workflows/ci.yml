name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # WebRTC handshakes can hang; cap the job so a stuck run fails fast instead
    # of waiting for the default 6h limit.
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        # The toolchain version, wasm targets, and rustfmt/clippy components are
        # pinned in rust-toolchain.toml; `rustup show` installs exactly those.
        run: rustup show active-toolchain || rustup toolchain install

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: ./scripts/setup.sh

      - name: Check formatting
        run: just fmt-check

      - name: Run clippy
        run: just clippy

      - name: Validate WIT
        run: just validate-wit

      - name: Build echo-demo guest component
        working-directory: jco-impl
        run: npm run build:component

      - name: Transpile echo-demo component (Node host)
        working-directory: jco-impl
        run: npm run transpile

      - name: Run browser host test (headless Chrome)
        working-directory: jco-impl
        run: npm run test:browser

      - name: Run tests
        run: just test
