name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy
# validation, and allow manual testing through the repository's "Actions" tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - scripts/setup.sh
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - scripts/setup.sh

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by
  # Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Lowest permissions needed for the setup steps. Copilot is given its own
    # token for its own operations.
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        # The toolchain version, wasm targets, and rustfmt/clippy components are
        # pinned in rust-toolchain.toml; `rustup show` installs exactly those.
        run: rustup show active-toolchain || rustup toolchain install

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: ./scripts/setup.sh
