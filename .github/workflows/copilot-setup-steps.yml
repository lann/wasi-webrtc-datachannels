name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy
# validation, and allow manual testing through the repository's "Actions" tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - scripts/setup.sh
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - scripts/setup.sh

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by
  # Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Lowest permissions needed for the setup steps. Copilot is given its own
    # token for its own operations.
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        # The toolchain version, wasm targets, and rustfmt/clippy components are
        # pinned in rust-toolchain.toml; `rustup show` installs exactly those.
        run: rustup show active-toolchain || rustup toolchain install

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24+ so `node --experimental-wasm-jspi` has JSPI
          # (WebAssembly.Suspending), which jco's async ABI and the conformance
          # jco-node adapter require.
          node-version: "24"

      - name: Download Shadow from release
        # Fetch the prebuilt Shadow network simulator from the `shadow-dev`
        # prerelease into ~/.local so the conformance Shadow lab
        # (`just conformance-shadow`) works in the agent environment without a
        # slow from-source build. Dispatch .github/workflows/shadow-build.yml if
        # the release does not exist yet. Best-effort: if the release is missing,
        # provisioning still succeeds and the lab recipe prints install guidance
        # when it is run without the binary.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/download-shadow.sh

      - name: Install dependencies
        run: ./scripts/setup.sh
        # cargo-binstall resolves releases through api.github.com; unauthenticated
        # requests share a 60/hour per-IP limit that pooled runner IPs exhaust
        # (intermittent 403s). The token moves it to the per-token limit.
        env:
          GITHUB_TOKEN: ${{ github.token }}
