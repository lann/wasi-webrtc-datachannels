# Capability manifest for the `wasip3-guest-x-wasmtime` interop pair (the
# wasip3-guest — the conformance guest composed with the in-guest `wasip3-impl`
# provider, run under `wasmtime run` — is the offerer, the wasmtime host the
# answerer; orchestrator: conformance/adapters/wasmtime, `conformance-interop`
# binary).
#
# The pair runs the two-peer behavioral subset over one shared mailbox and a real
# cross-runtime WebRTC data channel, so a green row proves the two runtimes
# interoperate rather than merely each passing against itself.

# NOTE: this pair is wired into `conformance-interop` but disabled by default
# (the `just conformance-interop` recipe passes --pair for the jco pairs only):
# the wasip3 peer exits before its final sentinel / SCTP close flushes, which
# stalls the wasmtime peer indefinitely. See TODO.md item E3; its row renders
# as no-result until the pair is re-enabled.

[target]
id = "wasip3-guest-x-wasmtime"

