# Capability manifest for the `jco-browser` target (the same jco-transpiled guest
# and the same `webrtc.js` + `signaling.js` host modules run inside a real,
# headless Chromium; adapter: conformance/adapters/jco, `run-browser.mjs`).
#
# The browser target shares the Node target's host modules, so it passes the same
# behavioral and peer-connection tests on loopback and reports the streaming /
# remaining error-taxonomy tests `skipped` from the guest (a raw `skip`,
# classified `skip-unsupported` without a manifest entry). Zero-length messages
# are delivered by Chrome's SCTP stack, so `zero-length-message` passes and is
# deliberately NOT an expected-fail.
#
# The netns-lab / NAT scenarios (`lan`, `stun-srflx`, `turn-relay`,
# `nat-matrix`) are declared unsupported-in-CI for this target when those
# scenarios land (the netns lab, conformance/README.md); on loopback there is nothing
# to mark unsupported yet.

[target]
id = "jco-browser"
