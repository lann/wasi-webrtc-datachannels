# Capability manifest for the `wasip3-guest` target (the whole WebRTC stack in
# wasm: the conformance guest composed via `wac plug` with the `wasip3-impl`
# provider — the sans-I/O `rtc` stack over WASIp3 `wasi:sockets` — an in-guest
# `wasi:http` mailbox client, and a CLI driver; adapter:
# conformance/adapters/wasip3, run under `wasmtime run`).
#
# Partial-surface notes (see TODO.md item E3):
# - The provider supplies its own host candidate from the socket it binds —
#   `ifaces()` is `Unsupported` on wasm, so there is no OS interface
#   enumeration or mDNS gathering.
# - `peer-connection` binds the address named by the `WEBRTC_UDP_BIND_ADDR`
#   environment variable, defaulting to IPv4 loopback — which is exactly what
#   the loopback scenario needs; the Shadow lab points each peer at its own
#   simulated non-loopback address through that variable.
#
# Tests the conformance guest itself reports `skipped` (the streaming forms and
# the remaining error-taxonomy probes) need no entries here: a raw `skip` is
# classified `skip-unsupported` without manifest involvement.

# `zero-length-message` used to be an expected-fail here (the `rtc` receive path
# kept the one-zero-byte SCTP placeholder payload for the BinaryEmpty/StringEmpty
# PPIDs), but upstream `rtc` now maps those PPIDs back to an empty message
# (webrtc-rs/rtc#131, merged; the workspace pins an upstream commit carrying it),
# so the wasip3-guest target passes it and it is deliberately NOT an
# expected-fail.

[target]
id = "wasip3-guest"
