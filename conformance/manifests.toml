# Target capability manifests for the conformance suite, one `[target.<id>]`
# table per target. Every declared target gets a matrix row; a target that
# declares no entries still must be listed here, or the runner ignores its
# adapter report (and a declared target with no report renders as a visible
# all-missing row).
#
# Schema — under each `[target.<id>]`:
#
#   [[target.<id>.unsupported]]   # zero or more; references TAGS from tests.toml.
#   tag = "<tag>"                 # every test carrying this tag becomes
#   reason = "<why>"              # `skip-unsupported` in the matrix (never a
#                                 # failure). Reason is mandatory.
#   environments = ["<env>"]      # OPTIONAL: restrict to specific environments
#                                 # (e.g. "loopback", "lan", "stun-srflx",
#                                 # "turn-relay", "nat-symmetric", "shadow").
#                                 # Absent = every environment; must be
#                                 # non-empty when present. A scoped entry takes
#                                 # precedence over an unscoped one.
#
#   [[target.<id>.expected-fail]] # zero or more; references TEST IDS from tests.toml.
#   test = "<test-id>"            # this test is known to fail on this target.
#   reason = "<why>"              # mandatory.
#   tracking = "<ref>"            # mandatory tracking reference (e.g. a TODO.md
#                                 # item) so divergences stay visible. An
#                                 # expected-fail that PASSES becomes
#                                 # `unexpected-pass` and FAILS the run, forcing
#                                 # this file to be cleaned up.
#   environments = ["<env>"]      # OPTIONAL, same semantics as above: the test
#                                 # is only expected to fail in the listed
#                                 # environments; elsewhere a failure is a real
#                                 # FAIL and a pass is a plain pass.
#
# A raw `skip` reported by an adapter is classified `skip-unsupported` without
# manifest involvement (no registered test is currently skipped anywhere).

# The native Wasmtime host over webrtc-rs (adapter: conformance/adapters/wasmtime).
[target.wasmtime]

# The browser-first host transpiled by jco, run under Node with `@roamhq/wrtc`
# (adapter: conformance/adapters/jco, `run-node.mjs`). Implements the full
# `connections` surface and drives real signaling over the suite mailbox.
# `@roamhq/wrtc` delivers zero-length messages, so `zero-length-message` passes
# and is deliberately NOT an expected-fail.
[target.jco-node]

# The same jco-transpiled guest and the same `webrtc.js` + `signaling.js` host
# modules run inside a real, headless Chromium (adapter:
# conformance/adapters/jco, `run-browser.mjs`). Chrome's SCTP stack delivers
# zero-length messages, so `zero-length-message` passes here too. The netns-lab
# / NAT scenarios would be declared unsupported-in-CI for this target if they
# ever cover it (Chrome cannot easily be placed in a network namespace in CI).
[target.jco-browser]

# The whole WebRTC stack in wasm: the conformance guest composed via `wac plug`
# with the `wasip3-impl` provider — the sans-I/O `rtc` stack over WASIp3
# `wasi:sockets` — an in-guest `wasi:http` mailbox client, and a CLI driver
# (adapter: conformance/adapters/wasip3, run under `wasmtime run`).
#
# Partial-surface notes:
# - The provider supplies its own host candidate from the socket it binds —
#   `ifaces()` is `Unsupported` on wasm, so there is no OS interface
#   enumeration or mDNS gathering.
# - `peer-connection` binds the address named by the `WEBRTC_UDP_BIND_ADDR`
#   environment variable, defaulting to IPv4 loopback — which is exactly what
#   the loopback scenario needs; the Shadow lab points each peer at its own
#   simulated non-loopback address through that variable.
#
# `zero-length-message` used to be an expected-fail here (the `rtc` receive path
# kept the one-zero-byte SCTP placeholder payload for the BinaryEmpty/StringEmpty
# PPIDs), but upstream `rtc` now maps those PPIDs back to an empty message
# (webrtc-rs/rtc#131, released in `rtc` 0.20.0-rc.4, which the workspace pins),
# so this target passes it and it is deliberately NOT an expected-fail.
[target.wasip3-guest]

# The interop pairs run the two-peer behavioral subset over one shared mailbox
# and a real cross-runtime WebRTC data channel, so a green row proves the two
# runtimes interoperate rather than merely each passing against itself. Each
# pair id is `<offerer>-x-<answerer>`; the orchestrator is the
# `conformance-interop` binary in conformance/adapters/wasmtime.
[target.wasmtime-x-jco-node]
[target.jco-node-x-wasmtime]
[target.wasmtime-x-jco-browser]
[target.jco-browser-x-wasmtime]
[target.wasmtime-x-wasip3-guest]
[target.wasip3-guest-x-wasmtime]
