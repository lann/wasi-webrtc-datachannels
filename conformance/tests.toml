# Conformance test registry
#
# The single source of truth for which conformance tests exist. The conformance
# guest component mirrors these ids and tags via its `list-tests` export; the
# target manifests (`manifests.toml`) reference the `tags` here to declare
# whole groups unsupported and the `id`s to declare expected failures. The
# runner plans each target's test list from this file.
#
# Schema — each test is a `[[test]]` array-of-tables entry with:
#   id          (string, required, unique) — stable identifier; matches the
#               guest's `list-tests` output and the adapters' result documents.
#   tags        (array of strings, optional) — grouping labels a manifest can
#               mark `unsupported`; keep tags stable as the corpus grows.
#   description (string, required) — one line describing the asserted behavior.
#
# Assertions target WIT-observable interoperable behavior only — never SDP
# contents, candidate ordering, timing, or exact error strings.
#
# --- Data-channel semantics ---------------------------------------------------

[[test]]
id = "label-round-trip"
tags = ["data-channel"]
description = "Negotiated label is observed identically by both peers."

[[test]]
id = "binary-message"
tags = ["data-channel"]
description = "Binary message kind is preserved end to end."

[[test]]
id = "text-message"
tags = ["data-channel"]
description = "Text message kind is preserved end to end."

[[test]]
id = "message-boundaries"
tags = ["data-channel"]
description = "N distinct sent messages arrive as N distinct messages."

[[test]]
id = "zero-length-message"
tags = ["data-channel"]
description = "Empty binary and empty string messages round-trip."

[[test]]
id = "large-message"
tags = ["data-channel"]
description = "Payloads near SCTP practical limits round-trip (parameterized)."

[[test]]
id = "ordering"
tags = ["data-channel"]
description = "With ordered:true, indexed payloads arrive in order."

[[test]]
id = "payload-integrity"
tags = ["data-channel"]
description = "Indexed + checksummed payloads verified byte-for-byte."

[[test]]
id = "concurrent-send-receive"
tags = ["data-channel"]
description = "Pipelined concurrent send/receive completes."

[[test]]
id = "send-via-stream"
tags = ["data-channel", "streaming"]
description = "Streaming send form round-trips; stream-message invariants hold."

[[test]]
id = "receive-via-stream"
tags = ["data-channel", "streaming"]
description = "Streaming receive form round-trips; stream-message invariants hold."

[[test]]
id = "receive-via-stream-once"
tags = ["data-channel", "streaming", "errors"]
description = "Second receive-via-stream and later receive return error.receiving-via-stream; pending receives resolve with it."

[[test]]
id = "post-close-send"
tags = ["data-channel", "errors"]
description = "Send after close yields error.closed."

[[test]]
id = "receive-buffer-overflow"
tags = ["data-channel", "errors", "flow-control"]
description = "Flooding a non-receiving peer closes the channel; after the buffered backlog, receive yields error.receive-buffer-overflow."

[[test]]
id = "max-retransmits-accepted"
tags = ["data-channel", "unreliable-channels"]
description = "max-retransmits option accepted; channel still functions."

# --- Error taxonomy -----------------------------------------------------------

[[test]]
id = "error-invalid-signaling"
tags = ["errors"]
description = "Malformed SDP/candidate yields error.invalid-signaling."

[[test]]
id = "error-closed"
tags = ["errors"]
description = "Operations on a closed channel yield error.closed."

[[test]]
id = "error-timed-out"
tags = ["errors"]
description = "Handshake timeout yields error.timed-out."

# --- Peer-connection semantics ------------------------------------------------

[[test]]
id = "peer-offer-answer"
tags = ["peer-connection"]
description = "Offer/answer state-machine happy path."

[[test]]
id = "peer-create-data-channel"
tags = ["peer-connection"]
description = "create-data-channel + incoming-data-channels surface the channel."

[[test]]
id = "peer-local-ice-candidates"
tags = ["peer-connection"]
description = "local-ice-candidates streams and signals end-of-candidates."

[[test]]
id = "peer-add-ice-candidate"
tags = ["peer-connection"]
description = "add-ice-candidate accepts a remote trickled candidate."

[[test]]
id = "peer-wait-connected"
tags = ["peer-connection"]
description = "wait-connected resolves once the connection is established."

[[test]]
id = "peer-wait-connected-latch"
tags = ["peer-connection"]
description = "wait-connected is latched: re-awaitable after connect, still ok after close."

[[test]]
id = "peer-close-releases"
tags = ["peer-connection"]
description = "close releases resources; subsequent ops do not hang."

[[test]]
id = "peer-invalid-sdp"
tags = ["peer-connection", "errors"]
description = "Invalid SDP into the peer-connection yields error.invalid-signaling."

# --- Interop handshake --------------------------------------------------------

[[test]]
id = "interop-handshake"
tags = ["interop", "signaling"]
description = "Full mailbox-driven offer/answer + trickle ICE, then a payload-integrity exchange."
