[workspace]
members = [
    "wasmtime-impl",
    "wasip3-impl",
    "examples/wasmtime-demo",
    "examples/echo-demo",
    "examples/cli-signaling",
    "examples/webrtc-consumer",
    "conformance/runner",
    "conformance/signaling/server",
    "conformance/guest",
]
resolver = "2"

# Pin the sans-I/O WebRTC stack once, here, so every member (and any future wasm
# build) resolves the same published 0.20 release-candidate source.
[workspace.dependencies]
rtc = "0.20.0-rc.3"
