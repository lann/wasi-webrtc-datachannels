[workspace]
members = [
    "wasmtime-impl",
    "wasip3-impl",
    "examples/wasmtime-demo",
    "examples/echo-demo",
    "examples/cli-signaling",
    "examples/webrtc-consumer",
    "conformance/runner",
    "conformance/signaling/server",
    "conformance/guest",
    "conformance/adapters/common",
    "conformance/adapters/wasmtime",
    "conformance/adapters/wasip3",
    "conformance/adapters/wasip3/mailbox",
    "conformance/adapters/wasip3/driver",
]
resolver = "2"

# Pin the sans-I/O WebRTC stack once, here, so every member (and any future wasm
# build) resolves the same source.
[workspace.dependencies]
rtc = "0.20.0-rc.3"

# Redirect every `rtc` resolution — the direct dependency of `wasip3-impl` and,
# crucially, the *transitive* dependency of the async `webrtc` 0.20 crate the
# Wasmtime host is built on — to the `lann/rtc` fork's `master`. That fork
# carries the empty-message receive fix (upstream PR webrtc-rs/rtc#131) on top of
# the published 0.20.0-rc.3 release candidate, so the Wasmtime host can receive
# zero-length messages (TODO.md item B6). Using `[patch]` rather than a direct
# git dependency is what lets the fix reach `webrtc`'s own copy of `rtc`.
[patch.crates-io]
rtc = { git = "https://github.com/lann/rtc.git", rev = "e3046a97c9f32965e2ae85d70a7104727f7d226b" }

# Redirect `wasip3` to the vendored copy under vendor/wasip3: the crates-io
# release pins wit-bindgen 0.57, which predates the 0.58/0.59 async-runtime
# fixes (task polling/spawn behavior, waitable-set handling around
# cancellation). The vendored copy is the published 0.7.0+wasi-0.3.0 source
# with wit-bindgen bumped to 0.59 and its bindings regenerated; see
# vendor/wasip3/Cargo.toml. Drop the patch once upstream wasi-rs moves to
# wit-bindgen >= 0.59.
wasip3 = { path = "vendor/wasip3" }
