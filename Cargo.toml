[workspace]
members = [
    "wasmtime-impl",
    "wasip3-impl",
    "examples/wasmtime-demo",
    "examples/echo-demo",
    "examples/cli-signaling",
]
resolver = "2"

# Pin the sans-I/O WebRTC stack once, here, so every member (and any future wasm
# build) resolves the exact same source: the `lann/rtc` `wasi` fork, which adds a
# wasm `ifaces()` stub and a socket2 0.6 bump so `rtc` compiles for
# `wasm32-wasip2`. Pinned by commit for reproducibility.
[workspace.dependencies]
rtc = { git = "https://github.com/lann/rtc.git", rev = "cefbb625d1ebc1ed2637c904a829baf6dc577769" }
