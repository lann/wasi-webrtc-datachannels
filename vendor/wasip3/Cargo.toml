# Vendored from the `wasip3` crate v0.7.0+wasi-0.3.0 (bytecodealliance/wasi-rs),
# with wit-bindgen bumped to 0.59 (the crates-io release pins 0.57, which
# predates async-runtime fixes; see the vendor README). Bindings in src/ are
# regenerated with wit-bindgen-cli 0.59.0 per upstream ci/regenerate.sh.


[package]
edition = "2021"
rust-version = "1.87.0"
name = "wasip3"
version = "0.7.0+wasi-0.3.0"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "WASIp3 API bindings for Rust"
documentation = "https://docs.rs/wasip3"
readme = "README.md"
keywords = [
    "webassembly",
    "wasm",
]
categories = [
    "no-std",
    "wasm",
]
license = "Apache-2.0 WITH LLVM-exception OR Apache-2.0 OR MIT"
repository = "https://github.com/bytecodealliance/wasi-rs"

[package.metadata.docs.rs]
all-features = true

[features]
async-spawn = ["wit-bindgen/async-spawn"]
bitflags = ["wit-bindgen/bitflags"]
default = [
    "std",
    "bitflags",
]
http-compat = [
    "dep:bytes",
    "dep:http-body",
    "dep:http",
    "dep:thiserror",
    "async-spawn",
]
rustc-dep-of-std = [
    "core",
    "alloc",
    "wit-bindgen/rustc-dep-of-std",
]
std = []
wit-bindgen-macros = ["wit-bindgen/macros"]

[lib]
name = "wasip3"
path = "src/lib.rs"

[[example]]
name = "cli-command"
crate-type = ["cdylib"]
path = "examples/cli-command.rs"

[[example]]
name = "http-proxy"
crate-type = ["cdylib"]
path = "examples/http-proxy.rs"

[[example]]
name = "http-proxy-compat"
crate-type = ["cdylib"]
path = "examples/http-proxy-compat.rs"
required-features = ["http-compat"]

[dependencies.alloc]
version = "1.0"
optional = true
package = "rustc-std-workspace-alloc"

[dependencies.bytes]
version = "1.10.1"
optional = true

[dependencies.core]
version = "1.0"
optional = true
package = "rustc-std-workspace-core"

[dependencies.http]
version = "1.3.1"
optional = true

[dependencies.http-body]
version = "1.0.1"
optional = true

[dependencies.thiserror]
version = "2.0.17"
optional = true

[dependencies.wit-bindgen]
version = "0.59.0"
features = ["async"]
default-features = false

[dev-dependencies.futures]
version = "0.3.31"

[dev-dependencies.http]
version = "1.3.1"

[dev-dependencies.wit-bindgen]
version = "0.59.0"
features = ["async-spawn"]
default-features = false

[workspace]
